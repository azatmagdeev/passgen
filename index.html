<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>PassGen</title>
</head>
<body>
<main style="margin: 0 auto">
    <h2>Password Generator</h2>
    <form>
        <p>
            <label>
                <input type="checkbox">
                <span>lower cases</span>
            </label>
        </p>
        <p>
            <label>
                <input type="checkbox">
                <span>UPPER CASES</span>
            </label>
        </p>
        <p>
            <label>
                <input type="checkbox">
                <span>numbers</span>
            </label>
        </p>
        <p>
            <label>
                <input type="checkbox">
                <span>special symbols</span>
            </label>
        </p>
        <h3>Length:</h3>
        <p>
            <label>
                <input type="radio">
                <span>6</span>
            </label>
            <label>
                <input type="radio">
                <span>8</span>
            </label>
            <label>
                <input type="radio">
                <span>10</span>
            </label>
        </p>
        <button>Generate!</button>
    </form>
</main>

<script src="app.js"></script>
</body>
</html>
