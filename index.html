<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="favicon.ico"/>
    <title>Password Generator</title>
</head>
<body>
<main>
    <h1>Password Generator</h1>
    <section>
        <form id="form">
            <div class="form-body">
                <div>
                    <p>
                        <label>
                            <input type="checkbox" name="lower" checked>
                            <span>lower (abc)</span>
                        </label>
                    </p>
                    <p>
                        <label>
                            <input type="checkbox" name="upper">
                            <span>UPPER (ABC)</span>
                        </label>
                    </p>
                    <p>
                        <label>
                            <input type="checkbox" name="num" checked>
                            <span>numbers (123)</span>
                        </label>
                    </p>
                    <p>
                        <label>
                            <input type="checkbox" name="symb">
                            <span>symbols (!@#)</span>
                        </label>
                    </p>
                </div>
                <div>
                    <div class="length">
                        <p>
                            <label>
                                <input name="pass_length" type="radio" value="8">
                                <span>8 characters</span>
                            </label>
                        </p>
                        <p>
                            <label>
                                <input name="pass_length" type="radio" value="10">
                                <span>10 characters</span>
                            </label>
                        </p>
                        <p>
                            <label>
                                <input name="pass_length" type="radio" value="12" checked>
                                <span>12 characters</span>
                            </label>
                        </p>
                        <p>
                            <label>
                                <input name="pass_length" type="radio" value="15">
                                <span>15 characters</span>
                            </label>
                        </p>
                    </div>
                </div>
            </div>
            <div class="form-footer">
                <button class="btn">Generate!</button>
            </div>
        </form>
        <div id="result"></div>
    </section>
</main>
<script src="app.js"></script>
</body>
</html>
